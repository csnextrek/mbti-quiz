<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老闆記帳 MBTI 測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-main: #5ECAD6;
    --blue-deep: #3aacba;
    --blue-richer: #2d96a4;
    --blue-mid: #8ddce6;
    --blue-light: #b8edf2;
    --blue-pale: #e0f7fa;
    --blue-ghost: #f0fbfc;
    --white: #ffffff;
    --ink: #1a3a3f;
    --ink-mid: #2e6670;
    --ink-soft: #4a8f9a;
    --muted: #7ab8c0;
    --border: #b0dde3;
    --gold: #c8a84b;
    --gold-soft: #debb6a;
    --gold-text: #5a3e00;
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'GenJyuuGothic', 'Noto Sans TC', 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
  }

  @font-face {
    font-family: 'GenJyuuGothic';
    src: local('源柔ゴシック'), local('Gen Jyuu Gothic'), local('GenJyuuGothic');
    font-weight: 400;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--blue-pale);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── INTRO ─── */
  #screen-intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem;
    background: linear-gradient(160deg, #edfafb 0%, #c5eef5 30%, #9ddde8 65%, #5ECAD6 100%);
    position: relative;
    overflow: hidden;
  }

  #screen-intro::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.22) 0%, transparent 68%);
    top: -140px; right: -120px;
    pointer-events: none;
  }

  #screen-intro::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(94,202,214,0.25) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    pointer-events: none;
  }

  .intro-card {
    max-width: 500px;
    width: 100%;
    background: rgba(255,255,255,0.74);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255,255,255,0.88);
    border-radius: 28px;
    padding: 2.75rem clamp(1.25rem, 5vw, 2.5rem) 0;
    text-align: center;
    box-shadow: 0 12px 48px rgba(58,172,186,0.2), 0 2px 10px rgba(0,0,0,0.06);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .intro-deco-bar {
    width: 52px; height: 4px;
    background: linear-gradient(90deg, var(--blue-main), var(--gold));
    border-radius: 2px;
    margin: 0 auto 1.5rem;
  }

  .intro-title {
    font-family: var(--font);
    font-size: clamp(1.25rem, 5vw, 2.2rem);
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.75rem;
    letter-spacing: 0.02em;
    text-align: center;
    white-space: nowrap;
  }

  .intro-title span { color: var(--blue-deep); }

  .intro-title-sub {
    color: var(--ink) !important;
    font-size: clamp(0.8rem, 3vw, 1.25rem);
    font-weight: 500;
  }

  .intro-sub {
    font-size: 0.9rem;
    color: var(--ink-soft);
    margin-bottom: 1.75rem;
    line-height: 1.85;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 0 1.5rem;
  }

  .meta-row {
    display: flex;
    justify-content: center;
    margin-bottom: 1.75rem;
  }

  .meta-item {
    text-align: center;
    flex: 1;
    position: relative;
  }

  .meta-item + .meta-item::before {
    content: '';
    position: absolute;
    left: 0; top: 18%; bottom: 18%;
    width: 1px;
    background: var(--border);
  }

  .meta-num {
    font-family: var(--font);
    font-size: 2.1rem;
    font-weight: 700;
    color: var(--blue-deep);
    line-height: 1;
    margin-bottom: 5px;
  }

  .meta-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .btn-start {
    display: block;
    margin-left: auto;
    margin-right: auto;
    width: fit-content;
    background: linear-gradient(135deg, var(--blue-main) 0%, var(--blue-deep) 100%);
    color: white;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 0.9rem 3rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 5px 20px rgba(58,172,186,0.4);
    margin-top: 2rem;
    margin-bottom: 2rem;
  }

  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 9px 28px rgba(58,172,186,0.48); }
  .btn-start:active { transform: translateY(0); }

  /* logo zone */
  .logo-zone {
    border-top: none;
    padding: 2rem 0 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    background: none;
  }

  .logo-zone-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--muted);
  }

  .brand-logo {
    display: block;
    width: 140px;
    height: auto;
  }

  .brand-logo svg,
  .brand-logo img {
    width: 100%;
    height: auto;
    display: block;
  }

  .logo-box {
    width: 130px;
    height: 44px;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    background: rgba(255,255,255,0.55);
  }

  /* ─── QUIZ ─── */
  #screen-quiz {
    display: none;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
    background: linear-gradient(180deg, #e8f9fb 0%, #caf0f5 50%, #a8e6ed 100%);
  }

  .quiz-wrap { max-width: 640px; margin: 0 auto; }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.1rem;
    padding: 0.7rem 1.1rem;
    background: rgba(255,255,255,0.72);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
  }

  .quiz-logo {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--ink-mid);
    letter-spacing: 0.04em;
  }

  .quiz-progress-text {
    font-size: 0.76rem;
    color: var(--muted);
    font-weight: 500;
  }

  .progress-bar-wrap {
    height: 5px;
    background: rgba(94,202,214,0.2);
    border-radius: 3px;
    margin-bottom: 1.75rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: #2F7E9A;
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .question-card {
    background: rgba(255,255,255,0.82);
    border: 1.5px solid rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 1.1rem;
    backdrop-filter: blur(12px);
    box-shadow: 0 5px 28px rgba(58,172,186,0.12);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 0.67rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--blue-main);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .q-number::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--blue-light);
  }

  .q-text {
    font-size: 1rem;
    line-height: 1.82;
    font-weight: 500;
    margin-bottom: 1.4rem;
    color: var(--ink);
  }

  .options { display: flex; flex-direction: column; gap: 0.7rem; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    background: rgba(240,251,252,0.55);
    border: 1.5px solid var(--border);
    padding: 1rem 1.25rem;
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    border-radius: var(--radius-sm);
    width: 100%;
  }

  .option-btn:hover {
    border-color: var(--blue-main);
    background: rgba(94,202,214,0.09);
    box-shadow: 0 2px 12px rgba(94,202,214,0.16);
  }

  .option-btn.selected {
    border-color: #2F7E9A;
    border-width: 2px;
    background: #2F7E9A;
    color: white;
    box-shadow: 0 4px 18px rgba(47,126,154,0.35);
    font-weight: 500;
  }

  .opt-label {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.67rem;
    font-weight: 700;
    margin-top: 1px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    color: var(--muted);
  }

  .option-btn.selected .opt-label {
    background: var(--blue-main);
    border-color: var(--blue-main);
    color: white;
  }

  .nav-row {
    display: flex;
    justify-content: flex-end;
    gap: 0.7rem;
    margin-top: 0.6rem;
  }

  .btn-nav {
    padding: 0.58rem 1.4rem;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.75);
    font-family: var(--font);
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 50px;
    color: var(--ink-mid);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .btn-nav:hover { border-color: var(--blue-main); background: var(--blue-pale); color: var(--blue-deep); }
  .btn-nav.primary { background: linear-gradient(135deg, var(--blue-main), var(--blue-deep)); border-color: transparent; color: white; box-shadow: 0 3px 14px rgba(58,172,186,0.32); }
  .btn-nav.primary:hover { box-shadow: 0 6px 20px rgba(58,172,186,0.42); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-submit {
    padding: 0.7rem 2.1rem;
    border: none;
    background: #2F7E9A;
    color: white;
    font-family: var(--font);
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 50px;
    box-shadow: 0 4px 18px rgba(47,126,154,0.38);
    transition: transform 0.15s, box-shadow 0.15s;
    display: none;
  }

  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(47,126,154,0.48); }
  .btn-submit:active { transform: translateY(0); }

  /* ─── RESULT ─── */
  #screen-result {
    display: none;
    min-height: 100vh;
    padding: 1rem 1rem 2rem;
    background: linear-gradient(160deg, #e0f8fb 0%, #b8edf5 40%, #78d2df 100%);
  }

  .result-wrap {
    max-width: 480px;
    margin: 0 auto;
    min-height: calc(100vh - 4rem);
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  /* ── 主卡 ── */
  .result-main-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 6px 28px rgba(58,172,186,0.18);
    padding: 1.75rem 1.5rem 1.4rem;
    text-align: center;
  }

  /* 身份資訊：標題優先 */
  .result-eyebrow {
    font-size: 0.85rem;
    color: var(--ink);
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .result-type-badge {
    display: block;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 0.5rem;
    text-align: center;
    border: none;
    background: none;
    padding: 0;
  }

  .result-headline {
    font-family: var(--font);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--blue-deep);
    line-height: 1.3;
    margin-bottom: 1.2rem;
    text-align: center;
  }

  /* 小圓形圖片 */
  .result-img-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 1.2rem;
    border: none;
    box-shadow: 0 4px 16px rgba(58,172,186,0.2);
    background: linear-gradient(135deg, #d8f4f8, #aee8f0);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-img-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .result-img-circle .circle-type {
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--blue-deep);
    opacity: 0.6;
    letter-spacing: 0.12em;
    text-align: center;
  }

  .result-img-circle .circle-note {
    font-size: 0.55rem;
    color: var(--muted);
    text-align: center;
    padding: 0 8px;
    line-height: 1.4;
  }

  /* 人格解說 */
  .result-desc {
    font-size: 1rem;
    line-height: 1.8;
    color: var(--ink);
    text-align: justify;
    text-align-last: left;
    padding: 0 0.5rem 1rem;
  }

  /* 三關鍵字 */
  .result-keywords {
    display: flex;
    justify-content: center;
    gap: 0.45rem;
    flex-wrap: wrap;
  }

  .keyword-tag {
    background: rgba(94,202,214,0.1);
    border: 1.5px solid var(--blue-light);
    padding: 0.35rem 1rem;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--ink-mid);
    border-radius: 50px;
  }

  /* ── 並列卡 ── */
  .result-bottom-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .result-section-card {
    background: white;
    border-radius: 18px;
    padding: 1.1rem 1.1rem;
    box-shadow: 0 4px 18px rgba(58,172,186,0.12);
    flex: 3;
  }

  .result-section-card.accent {
    background: white;
    border: 1.5px solid var(--blue-light);
    flex: 2;
  }

  .section-label {
    display: inline-block;
    background: var(--blue-main);
    color: white;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 0.22rem 0.75rem;
    border-radius: 50px;
    margin-bottom: 0.75rem;
  }

  .result-section-card.accent .section-label {
    background: #2F7E9A;
  }

  .section-body {
    font-size: 0.82rem;
    line-height: 1.75;
    color: var(--ink);
  }

  /* ── 再測一次 ── */
  .result-logo-wrap {
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .result-logo-wrap .brand-logo {
    width: 100px;
  }

  .btn-retry {
    display: block;
    width: fit-content;
    margin: -0.25rem auto 0;
    background: white;
    border: 1.5px solid var(--ink-mid);
    padding: 0.72rem 2.5rem;
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 50px;
    color: var(--ink-mid);
    transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
  }

  .btn-retry:hover {
    border-color: var(--blue-main);
    color: var(--blue-deep);
    box-shadow: 0 4px 16px rgba(94,202,214,0.22);
    background: var(--blue-ghost);
  }
</style>
</head>
<body>

<!-- ════ INTRO ════ -->
<div id="screen-intro">
  <div class="intro-card">
    <h1 class="intro-title"><span>測測你是哪種 MBTI 老闆</span><br><span class="intro-title-sub">3 分鐘揭曉你的老闆體質與財務小提醒</span></h1>
    <button class="btn-start" onclick="startQuiz()">開始測驗 →</button>
    <div class="logo-zone">
      <div class="brand-logo"><img src="images/brand-logo.svg" alt="品牌 Logo"></div>
    </div>
  </div>
</div>

<!-- ════ QUIZ ════ -->
<div id="screen-quiz">
  <div class="quiz-wrap">
    <div class="quiz-header">
      <div class="quiz-logo">測測你是哪種 MBTI 老闆</div>
      <div class="quiz-progress-text" id="progress-text">1 / 20</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div id="question-area"></div>
    <div class="nav-row">
      <button class="btn-nav" id="btn-prev" onclick="prevQ()">← 上一題</button>
      <button class="btn-nav primary" id="btn-next" onclick="nextQ()">下一題 →</button>
      <button class="btn-submit" id="btn-submit" onclick="submitQuiz()">揭曉結果 →</button>
    </div>
  </div>
</div>

<!-- ════ RESULT ════ -->
<div id="screen-result">
  <div class="result-wrap">

    <!-- Logo -->
    <div class="result-logo-wrap"><div class="brand-logo"><img src="images/result-logo.svg" alt="品牌 Logo"></div></div>

    <!-- 主卡 -->
    <div class="result-main-card">
      <!-- 1. 標題最優先 -->
      <p class="result-eyebrow">你是</p>
      <div class="result-type-badge" id="res-type"></div>
      <div class="result-headline" id="res-headline"></div>

      <!-- 2. 小圓圖 -->
      <div class="result-img-circle" id="res-img-placeholder">

      </div>

      <!-- 3. 人格解說 -->
      <div class="result-desc" id="res-desc">（人格特質解說，50字以內）</div>

      <!-- 4. 關鍵字 -->
      <div class="result-keywords" id="res-keywords"></div>
    </div>

    <button class="btn-retry" onclick="retryQuiz()">再測一次</button>

  </div>
</div>

<script>
const SVG_MAP = {
  ENFJ: "images/ENFJ.svg",
  ENFP: "images/ENFP.svg",
  ENTJ: "images/ENTJ.svg",
  ENTP: "images/ENTP.svg",
  ESFJ: "images/ESFJ.svg",
  ESFP: "images/ESFP.svg",
  ESTJ: "images/ESTJ.svg",
  ESTP: "images/ESTP.svg",
  INFJ: "images/INFJ.svg",
  INFP: "images/INFP.svg",
  INTJ: "images/INTJ.svg",
  INTP: "images/INTP.svg",
  ISFJ: "images/ISFJ.svg",
  ISFP: "images/ISFP.svg",
  ISTJ: "images/ISTJ.svg",
  ISTP: "images/ISTP.svg"
};

const QUESTIONS = [
  // 1 EI — 輕鬆暖身，社交場景最容易帶入
  { q:"去參加商會或創業聚會，你通常會如何認識其他老闆？", a:"主動出擊，四處遞名片並熱情介紹自己公司的服務。", b:"先在旁邊聽大家聊什麼，遇到氣場合的人再深入交談。", dim:"EI" },
  // 2 TF — 職場決策，大多數老闆都有感
  { q:"團隊提出一個超出預算的行銷提案，你通常會：", a:"堅持看數據說話，投資報酬率算不過來就直接退件。", b:"怕打擊團隊熱情與士氣，會加減撥點預算讓他們試水溫。", dim:"TF" },
  // 3 SN — 設備採購，具體且高代入感
  { q:"決定是否採購昂貴的新設備時，你會先關注：", a:"具體折舊年限、每月攤提多少，以及現金流是否負擔得起。", b:"這台設備能為公司帶來多少未來競爭力與業務可能性。", dim:"SN" },
  // 4 JP — 空閒時間選擇，輕鬆但很能照出風格
  { q:"今天難得沒有客戶找你，突然多出 1 小時空檔，你會：", a:"立刻打開記帳軟體，把累積的發票跟對帳單核對完畢。", b:"隨性研究市場新商業模式，或思考產品下一步怎麼轉型。", dim:"JP" },
  // 5 EI — 合夥人打斷，情境感強、張力剛好
  { q:"正在對帳時，合夥人突然找你討論明年的擴張計畫，你會怎麼做：", a:"放下帳本，跟他開始腦力激盪想新點子。", b:"請他先說重點，等自己手邊的數字對完後再討論。", dim:"EI" },
  // 6 TF — 資金緊縮，決策壓力升溫，銜接決策類
  { q:"當公司面臨資金緊縮，必須砍掉部分開銷時，你通常會：", a:"攤開報表，冷靜客觀地直接砍掉目前未能獲利的項目支出。", b:"考量牽涉的員工與長期合作廠商，尋找傷害最低的折衷方案。", dim:"TF" },

  { q:"你傾向如何管理公司每個月的記帳任務？", a:"嚴格規定自己或員工，在每月 5 號前完成憑證歸檔對齊。", b:"先把發票收集起來，等報稅期限快到了再一口氣整理。", dim:"JP" },
  // 9 EI — 與外部交涉，比題 1 更有壓力感，放中後段
  { q:"面對需要跟外部會計師交涉財務狀況時，你通常會：", a:"直接打電話或見面口頭討論，快速了解如何節稅貸款。", b:"先把財報與現金流整理成試算表，寄 Email 請對方評估。", dim:"EI" },
  // 10 TF — 會計師警告，帶點緊張感，決策收尾
  { q:"當會計師警告你「毛利率太低、費用太高」時，最先想的是：", a:"「立刻攤開各項費用明細！到底哪幾項指標偏離業界平均？」", b:"「糟了，會計師是不是覺得我經營得很差？公司要倒了嗎？」", dim:"TF" },
  // 11 SN — 年度目標規劃，視野拉高，讓情緒緩和
  { q:"在規劃公司的年度目標時，你最不能忍受的是：", a:"只有「成為業界第一」的空泛口號，卻沒編列具體預算。", b:"花一小時糾結砍幾百塊文具費，卻不討論如何開發新市場。", dim:"SN" },
  // 12 JP — 成就感作結，正面收尾，讓人帶著好情緒等結果
  { q:"創業過程中，哪種時刻會讓你覺得最有成就感？", a:"看到公司營收漂亮達標，財報穩定健康成長。", b:"成功談下充滿未知的創新合作，在市場上殺出一條新血路。", dim:"JP" },

const DIM_A = { EI:"E", SN:"S", TF:"T", JP:"J" };
const DIM_B = { EI:"I", SN:"N", TF:"F", JP:"P" };

const MBTI_DATA = {
  ESTJ:{ headline:"講求效率的領導型老闆", keywords:["#超強執行力","#可靠","#直率"], desc50:"你天生自帶強大氣場，做事講求效率與規則。公司的投資要過你這關，得先拿出具體計劃再說！不過有時候也可以多聽聽內部員工的意見，讓團隊更有參與感喔！", tips:"" },
  ESTP:{ headline:"活力滿滿的行動派老闆", keywords:["#活在當下","#直覺敏銳","#熱愛挑戰"], desc50:"比起長遠規劃，你更擅長抓住眼前的賺錢機會，看到機會先衝再說。不過在熱血行動後，最好多確認財務狀況，才能讓公司走得更長遠。", tips:"" },
  ESFJ:{ headline:"最講人情的佛心老闆", keywords:["#樂於助人","#討人喜歡","#觀察力強"], desc50:"把公司當自己家在經營的你，精打細算卻不忘人情。比起埋頭記帳，你更常操心全公司的大小事。別什麼都自己來，試著開權限讓員工分工管帳，你只需專注看財報抓大方向。", tips:"" },
  ESFP:{ headline:"自由奔放的熱情老闆", keywords:["#活在當下","#社交達人","#好相處"], desc50:"錢沒有不見，只是變成你喜歡的樣子。交際手腕一流的你，小心因搏感情讓應酬費用嚴重超支，盡情社交之餘，記得按時記帳、定期看帳，公司經營更安心。", tips:"" },
  ENTJ:{ headline:"有遠見魄力的天才老闆", keywords:["#顧全大局","#好勝心強","#直率"], desc50:"你天生就是當老闆的料！懂看大局，一旦發現哪裡不賺錢，砍預算也絕不手軟。不過再偉大的計畫，也需要數字支撐，記得定期看財報，用真實數據驗證你的商業直覺。", tips:"" },
  ENTP:{ headline:"鬼靈精怪的點子王老闆", keywords:["#不按牌理出牌","#勇於挑戰","#反應快"], desc50:"創意力爆棚的你，滿腦子都是鬼點子。比起細算每筆花費，你更在乎資金能否實現新計畫。記帳容易有頭沒尾，先從大項花費開始記起，總比什麼都沒記來的好喔！", tips:"" },
  ENFJ:{ headline:"值得追隨的親民老闆", keywords:["#天生領袖","#替人著想","#超強親和力"], desc50:"你總能用自己的信念和熱情影響身邊的人，深得人心！但守護公司得先顧好現金流，別因顧及情面而不好意思向客戶催款，該收的錢還是要按時追回喔！", tips:"" },
  ENFP:{ headline:"熱血追夢的冒險型老闆", keywords:["#富想像力","#充滿好奇心","#熱情"], desc50:"只要理念對了，要你砸再多錢也願意！天天都有新想法的你，往往計劃趕不上變化，不妨每週固定撥一天整理帳務，回頭確認錢都花在哪裡，才不會衝太快喔！", tips:"" },
  ISTJ:{ headline:"按部就班的細節控老闆", keywords:["#言出必行","#守規矩","#自律"], desc50:"你做事有一套自己的 SOP，對記帳有嚴格的要求，一旦發現數字對不上就倍感焦慮。其實記帳不用記那麼細，學會抓大放小，才不會累死自己喔！", tips:"" },
  ISTP:{ headline:"臨危不亂的理智派老闆", keywords:["#條理分明","#充滿神秘感","#獨行俠"], desc50:"你的反應很快，遇到財務問題時，總能迅速抓到關鍵、找出解法。試著把眼光放遠一點，行動前先多想想，可以多留意團隊的感受，帶人更要帶心。", tips:"" },
  ISFJ:{ headline:"無私奉獻的守護型老闆", keywords:["#樂於助人","#體貼","#負責"], desc50:"你總是默默把事情做到最好，就連記帳也不馬虎。在追求細節的同時，也不忘照顧他人的感受。記帳不用一開始就要求完美，也要適時保留一點彈性喔！", tips:"" },
  ISFP:{ headline:"溫柔體貼的高美感老闆", keywords:["#樂於助人","#美感至上","#包容"], desc50:"創業帶來的成就感，比賺錢本身更讓你著迷。重視質感與感受的你，做決定常常會在意他人想法。不過感性之外，經營終究得顧及現實數字喔！", tips:"" },
  INTJ:{ headline:"冷靜果斷的計畫通老闆", keywords:["#完美主義","#高效率","#獨立"], desc50:"你擅長規劃，懂得控制支出和預算，最受不了把錢花在沒效率的地方！規劃預算時不妨保留一點彈性，別太走火入魔唷！", tips:"" },
  INTP:{ headline:"腦袋停不下來的分析型老闆", keywords:["#理智滿分","#重視邏輯","#冷靜"], desc50:"你總是獨立思考，凡事用數據說話，擅長分析卻討厭死板規則。與團隊檢討預算時，多留意溝通溫度，才不會傷了團隊和氣喔！", tips:"" },
  INFJ:{ headline:"讀懂人心的共感型老闆", keywords:["#洞察人心","#直覺敏銳","#有遠見"], desc50:"你總能察覺他人沒說出口的感受，每一句話都直戳人心。對你來說，經營公司不只是賺錢，更是想做一件值得、對人有幫助的事。注意提前規劃好預算，避免財務吃緊。", tips:"" },
  INFP:{ headline:"理想至上的高敏感老闆", keywords:["#洞察人心","#富有同理心","#追求自由"], desc50:"只要讓你覺得有意義，你就會全力投入！雖然理想很豐滿，但經營終究得回歸現實面考量，每週記帳或許有點乏味，卻能幫你把錢用在真正重要的地方喔！", tips:"" },
};

let answers = new Array(12).fill(null);
let current = 0;

function startQuiz() {
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = QUESTIONS[current];
  document.getElementById('question-area').innerHTML = `
    <div class="question-card">
      <div class="q-number">第 ${current+1} 題，共 12 題</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        <button class="option-btn ${answers[current]==='a'?'selected':''}" onclick="selectOpt('a')">
          <span>${q.a}</span>
        </button>
        <button class="option-btn ${answers[current]==='b'?'selected':''}" onclick="selectOpt('b')">
          <span>${q.b}</span>
        </button>
      </div>
    </div>`;
  document.getElementById('progress-text').textContent = `${current+1} / 12`;
  document.getElementById('progress-bar').style.width = `${(current/12)*100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  const isLast = current === 11;
  document.getElementById('btn-next').style.display = isLast ? 'none' : '';
  document.getElementById('btn-submit').style.display = isLast ? 'inline-block' : 'none';
}

function selectOpt(val) {
  answers[current] = val;
  document.querySelectorAll('.option-btn').forEach((b,i) => {
    b.classList.toggle('selected', (i===0&&val==='a')||(i===1&&val==='b'));
  });
}

function nextQ() {
  if (answers[current] === null) {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => { b.style.borderColor = '#2F7E9A'; });
    setTimeout(() => btns.forEach(b => { b.style.borderColor = ''; }), 600);
    return;
  }
  if (current < 11) { current++; renderQ(); }
}
function prevQ() { if (current > 0) { current--; renderQ(); } }

function submitQuiz() {
  const unanswered = answers.filter(a => a === null).length;
  if (unanswered > 0) {
    alert(`還有 ${unanswered} 題未作答，請完成所有題目後再提交！`);
    current = answers.findIndex(a => a === null);
    renderQ(); return;
  }
  showResult(calcMBTI());
}

function calcMBTI() {
  const c = { E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0 };
  QUESTIONS.forEach((q,i) => { c[answers[i]==='a'?DIM_A[q.dim]:DIM_B[q.dim]]++; });
  return (c.E>=c.I?'E':'I')+(c.S>=c.N?'S':'N')+(c.T>=c.F?'T':'F')+(c.J>=c.P?'J':'P');
}

function getScores() {
  const c = { E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0 };
  QUESTIONS.forEach((q,i) => { c[answers[i]==='a'?DIM_A[q.dim]:DIM_B[q.dim]]++; });
  return c;
}

function showResult(type) {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';
  const data = MBTI_DATA[type];

  // 人格標題
  document.getElementById('res-headline').textContent = data.headline;
  document.getElementById('res-type').textContent = type;

  // SVG 圖片
  const circle = document.getElementById('res-img-placeholder');
  if (SVG_MAP && SVG_MAP[type]) {
    circle.innerHTML = `<img src="${SVG_MAP[type]}" alt="${type}" style="width:100%;height:100%">`;
  }

  // 關鍵字
  const keywords = data.keywords || ['#待補', '#待補', '#待補'];
  document.getElementById('res-keywords').innerHTML = keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('');

  // 人格特質解說
  document.getElementById('res-desc').textContent = data.desc50 || '';

  window.scrollTo(0,0);
}

function retryQuiz() {
  answers = new Array(12).fill(null);
  current = 0;
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-intro').style.display = 'flex';
}
</script>
